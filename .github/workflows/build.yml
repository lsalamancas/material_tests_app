name: Build Executables

on:
  push:
    tags:
      - 'v*'  # Ejecutar cuando hagas push de un tag como v1.0.0

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        python -m PyInstaller run_app.py --name MaterialTestingAnalyzer --onedir --collect-all matplotlib --collect-all openpyxl
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaterialTestingAnalyzer-Windows
        path: dist/MaterialTestingAnalyzer

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable
      run: |
        python -m PyInstaller run_app.py --name MaterialTestingAnalyzer --onedir --collect-all matplotlib --collect-all openpyxl
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MaterialTestingAnalyzer-Linux
        path: dist/MaterialTestingAnalyzer

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          MaterialTestingAnalyzer-Windows/*
          MaterialTestingAnalyzer-Linux/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
